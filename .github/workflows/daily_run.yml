name: Daily TrendWatch Scraper

on:
  schedule:
    # Runs at 9:00 AM and 6:00 PM UTC daily
    - cron: '0 9,18 * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [ main, master ]
    paths:
      - 'scraper/**'
      - 'storage/config.yml'

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    # Prevent multiple concurrent runs
    concurrency:
      group: scraper-job
      cancel-in-progress: true
    
    steps:
      # 1. Checkout code
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # 2. Set up Python
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
          cache: 'pip'
      
      # 3. Install dependencies
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 pandas lxml pyyaml
          fi
          pip list
      
      # 4. Run the pipeline
      - name: 🚀 Run pipeline
        id: scrape
        run: |
          python -m scraper.pipeline
      
      # 5. Check for changes
      - name: 🔍 Check for changes
        id: check_changes
        run: |
          if git status --porcelain | grep -E 'storage/history.csv|dashboard/index.html'; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes to commit"
          fi
      
      # 6. Commit and push changes
      - name: 📤 Commit and push
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S UTC")
          git add storage/history.csv dashboard/index.html 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "ℹ️ No staged changes to commit"
            exit 0
          fi
          
          git commit -m "🤖 Auto-update: Scraped data ($TIMESTAMP)"
          git push
          echo "✅ Changes committed and pushed"
      
      # 7. Upload artifacts (for debugging)
      - name: 📎 Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-outputs
          path: |
            storage/history.csv
            dashboard/index.html
          retention-days: 7
      
      # 8. Send notification on failure
      - name: 📱 Send failure notification
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issueBody = `
            ## ⚠️ TrendWatch Scraper Failed
            
            **Time:** ${new Date().toLocaleString()}
            **Job:** ${context.job}
            **Run ID:** ${context.runId}
            
            Please check the [workflow logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Scraper Failed - ${new Date().toLocaleDateString()}`,
              body: issueBody,
              labels: ['bug', 'automation'],
            });
